```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Capuchones</title>

<style>
body{font-family:Arial;background:#0d0f14;color:#fff;margin:0}
#login-screen,#app-screen{display:flex;align-items:center;justify-content:center;height:100vh}
#app-screen{display:none;flex-direction:column}
input,button{padding:10px;margin:5px}
table{width:90%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #333;padding:10px;text-align:center}
button{cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <div>
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Correo"><br>
    <input type="password" id="login-pass" placeholder="Contraseña"><br>
    <button onclick="doLogin()">Ingresar</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <h2>Inventario</h2>
  <button onclick="doLogout()">Cerrar sesión</button>

  <br><br>

  <input type="text" id="ref" placeholder="Referencia">
  <input type="text" id="color" placeholder="Color">
  <input type="number" id="stock" placeholder="Stock">
  <button onclick="addItem()">Agregar</button>

  <table>
    <thead>
      <tr>
        <th>Ref</th>
        <th>Color</th>
        <th>Stock</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhQ8vaJ1f4vPIWpwgEo706DXbRV-6vz6s",
  authDomain: "inventario-capuchones.firebaseapp.com",
  projectId: "inventario-capuchones",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let items = [];

// LOGIN
function doLogin(){
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;

  auth.signInWithEmailAndPassword(email, pass)
  .catch(()=>document.getElementById('login-error').innerText="Error login");
}

// LOGOUT
function doLogout(){
  auth.signOut();
}

// SESION
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    cargarDatos();
  }else{
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

// AGREGAR
function addItem(){
  const ref = document.getElementById('ref').value;
  const color = document.getElementById('color').value;
  const stock = parseInt(document.getElementById('stock').value)||0;

  db.collection("inventario").add({ref,color,stock});
}

// CARGAR
function cargarDatos(){
  db.collection("inventario").onSnapshot(snap=>{
    items = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// MOSTRAR
function render(){
  const tabla = document.getElementById('tabla');

  tabla.innerHTML = items.map(i=>`
    <tr>
      <td>${i.ref}</td>
      <td>${i.color}</td>
      <td>${i.stock}</td>
      <td>
        <button onclick="sumar('${i.id}')">+</button>
        <button onclick="restar('${i.id}')">-</button>
      </td>
    </tr>
  `).join('');
}

// SUMAR
function sumar(id){
  const item = items.find(i=>i.id===id);
  db.collection("inventario").doc(id).update({
    stock:(item.stock||0)+1
  });
}

// RESTAR
function restar(id){
  const item = items.find(i=>i.id===id);
  db.collection("inventario").doc(id).update({
    stock:Math.max(0,(item.stock||0)-1)
  });
}
</script>

</body>
</html>
```
